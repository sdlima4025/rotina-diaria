<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Diário de Rotinas</title>


  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Google Icons / Material Symbols Rounded -->
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,400..700,0..1,-50..200"
    rel="stylesheet">

  <!-- CSS personalizado do projeto -->
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <main class="container py-4">

    <!-- Cabeçalho principal -->
    <header class="app-header d-flex align-items-start justify-content-between gap-3 mb-4">
      <div>
        <h1 class="app-title mb-2">
          <span class="material-symbols-rounded text-primary" aria-hidden="true">dashboard</span>
          Diário de Rotinas
        </h1>

        <p class="app-subtitle mb-0">
          Cadastre, edite, filtre e acompanhe suas tarefas com data, horário e cronômetro.
        </p>
      </div>

      <!-- Botão de alternância de tema -->
      <button type="button" class="btn btn-outline-secondary rounded-circle btn-theme" id="btnTema"
        aria-label="Alternar para modo escuro" aria-pressed="false" title="Alternar tema">
        <span id="iconeTema" class="material-symbols-rounded" aria-hidden="true">light_mode</span>
      </button>
    </header>

    <!-- Formulário de cadastro/edição -->
    <section class="app-panel mb-4" aria-labelledby="tituloFormulario">
      <h2 id="tituloFormulario" class="section-title mb-3">
        <span class="material-symbols-rounded" aria-hidden="true">add_task</span>
        Nova Tarefa
      </h2>

      <form id="formTarefa">
        <input type="hidden" id="tarefaId">

        <div class="row g-3">

          <!-- Data -->
          <div class="col-12 col-md-4">
            <label for="dataTarefa" class="form-label icon-label">
              <span class="material-symbols-rounded text-primary" aria-hidden="true">calendar_month</span>
              Data
            </label>

            <input type="text" id="dataTarefa" class="form-control" placeholder="DD/MM/AAAA" readonly required
              autocomplete="off" aria-haspopup="dialog">
          </div>

          <!-- Hora inicial -->
          <div class="col-12 col-md-4">
            <label for="horaInicialTarefa" class="form-label icon-label">
              <span class="material-symbols-rounded text-primary" aria-hidden="true">schedule</span>
              Hora Inicial
            </label>

            <input type="time" id="horaInicialTarefa" class="form-control campo-hora" required>
          </div>

          <!-- Hora final -->
          <div class="col-12 col-md-4">
            <label for="horaFinalTarefa" class="form-label icon-label">
              <span class="material-symbols-rounded text-primary" aria-hidden="true">event_available</span>
              Hora Final
            </label>

            <input type="time" id="horaFinalTarefa" class="form-control campo-hora" required>
          </div>

          <!-- Atividade -->
          <div class="col-12 col-md-6">
            <label for="atividadeTarefa" class="form-label icon-label">
              <span class="material-symbols-rounded text-primary" aria-hidden="true">task_alt</span>
              Atividade
            </label>

            <input type="text" id="atividadeTarefa" class="form-control" placeholder="Ex: Estudar JavaScript" required>
          </div>

          <!-- Tipo -->
          <div class="col-12 col-md-6">
            <label for="tipoTarefa" class="form-label icon-label">
              <span class="material-symbols-rounded text-primary" aria-hidden="true">category</span>
              Tipo
            </label>

            <select id="tipoTarefa" class="form-select" required>
              <option value="">Selecione</option>
              <option value="leitura">Leitura</option>
              <option value="programacao">Programação</option>
              <option value="saxofone">Saxofone</option>
              <option value="reuniao">Reunião</option>
              <option value="almoco">Almoço</option>
              <option value="pausa">Pausa</option>
              <option value="descanso">Descanso</option>
              <option value="outro">Outro</option>
            </select>
          </div>

          <!-- Descrição -->
          <div class="col-12">
            <label for="descricaoTarefa" class="form-label icon-label">
              <span class="material-symbols-rounded text-primary" aria-hidden="true">notes</span>
              Descrição
            </label>

            <textarea id="descricaoTarefa" class="form-control" rows="3"
              placeholder="Digite uma observação sobre a tarefa"></textarea>
          </div>

          <!-- Ações do formulário -->
          <div class="col-12 d-flex flex-column flex-sm-row gap-2">
            <button type="submit" class="btn btn-primary btn-action" id="btnSalvar">
              <span class="material-symbols-rounded" aria-hidden="true">add_task</span>
              Cadastrar Tarefa
            </button>

            <button type="button" class="btn btn-secondary btn-action" id="btnCancelarEdicao">
              <span class="material-symbols-rounded" aria-hidden="true">cleaning_services</span>
              Limpar Formulário
            </button>
          </div>
        </div>
      </form>
    </section>

    <!-- Painel de busca e filtros -->
    <section class="app-panel mb-4" aria-labelledby="tituloBusca">
      <h2 id="tituloBusca" class="section-title mb-3">
        <span class="material-symbols-rounded" aria-hidden="true">search</span>
        Buscar Tarefas
      </h2>

      <div class="row g-3 align-items-end mb-3">

        <!-- Barra de busca -->
        <div class="col-12 col-lg-9">
          <label for="campoBusca" class="form-label icon-label">
            <span class="material-symbols-rounded text-primary" aria-hidden="true">manage_search</span>
            Barra de Busca
          </label>

          <input type="search" id="campoBusca" class="form-control"
            placeholder="Digite atividade, descrição, tipo, data, horário ou status...">
        </div>

        <!-- Botão buscar -->
        <div class="col-12 col-lg-3">
          <button type="button" class="btn btn-primary w-100 btn-action" id="btnBuscar">
            <span class="material-symbols-rounded" aria-hidden="true">search</span>
            Buscar Tarefa
          </button>
        </div>

        <!-- Filtro por data -->
        <div class="col-12 col-md-4">
          <label for="filtroData" class="form-label icon-label">
            <span class="material-symbols-rounded text-primary" aria-hidden="true">calendar_today</span>
            Data
          </label>

          <input type="text" id="filtroData" class="form-control" placeholder="Filtrar por data" readonly
            autocomplete="off" aria-haspopup="dialog">
        </div>

        <!-- Filtro por atividade -->
        <div class="col-12 col-md-4">
          <label for="filtroAtividade" class="form-label icon-label">
            <span class="material-symbols-rounded text-primary" aria-hidden="true">fact_check</span>
            Atividade
          </label>

          <select id="filtroAtividade" class="form-select">
            <option value="todos">Todas as atividades</option>
          </select>
        </div>

        <!-- Filtro por tipo -->
        <div class="col-12 col-md-4">
          <label for="filtroTipo" class="form-label icon-label">
            <span class="material-symbols-rounded text-primary" aria-hidden="true">sell</span>
            Tipo
          </label>

          <select id="filtroTipo" class="form-select">
            <option value="todos">Todos os tipos</option>
            <option value="leitura">Leitura</option>
            <option value="programacao">Programação</option>
            <option value="saxofone">Saxofone</option>
            <option value="reuniao">Reunião</option>
            <option value="almoco">Almoço</option>
            <option value="pausa">Pausa</option>
            <option value="descanso">Descanso</option>
            <option value="outro">Outro</option>
          </select>
        </div>

        <!-- Limpar filtros -->
        <div class="col-12">
          <button type="button" class="btn btn-outline-secondary btn-action" id="btnLimparFiltros">
            <span class="material-symbols-rounded" aria-hidden="true">filter_alt_off</span>
            Limpar Filtros
          </button>
        </div>
      </div>

      <p class="resultado-busca mb-0" id="resultadoBusca" aria-live="polite"></p>
    </section>

    <!-- Container dos cards -->
    <section class="row g-4" id="cardsContainer" aria-label="Lista de tarefas em cards"></section>
  </main>

  <!-- Calendário customizado -->
  <div class="calendario-popup" id="calendarioPopup" role="dialog" aria-label="Calendário para seleção de data"></div>

  <!-- Bootstrap JS Bundle -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <!-- JavaScript personalizado -->
  <script src="script.js"></script>
</body>

</html>
